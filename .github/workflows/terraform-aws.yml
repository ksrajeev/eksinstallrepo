name: Terraform on AWS (master push)

# This workflow manages Terraform state files in the Git repository
# IMPORTANT: Requires repository write permissions for state management
# State files are automatically committed and pushed after each operation

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - apply-auto-approve
        - destroy

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for state file management
      pull-requests: write
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for state file management
          token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # (Optional) Verify the identity to ensure credentials are set
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # Pull latest state from repository
      - name: Pull latest state files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --ff-only || echo "No remote changes to pull"

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # set a pinned version if you want; otherwise latest stable
          terraform_version: 1.7.5

      # Set this to the directory where your Terraform code lives, if not repo root
      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: .
        run: terraform validate -no-color

      - name: Terraform Plan
        working-directory: .
        run: terraform plan -no-color -input=false -out=tfplan

      # Check if state file exists and add to git if modified
      - name: Commit state changes after plan (if any)
        run: |
          if [ -f terraform.tfstate ]; then
            git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
            git diff --staged --quiet || git commit -m "Updated terraform state after plan - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main || echo "No state changes to push"
          fi

      # Upload terraform plan for apply job
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment:
      name: production
      url: ${{ steps.apply.outputs.apply_url }}

    permissions:
      contents: write  # Required for state file management
      pull-requests: write
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for state file management
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pull latest changes including state files
      - name: Pull latest state from repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --ff-only || echo "No remote changes to pull"

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      # Download terraform plan from plan job
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      # Apply with manual approval (handled by environment protection)
      - name: Terraform Apply
        id: apply
        working-directory: .
        run: |
          echo "Applying Terraform plan..."
          terraform apply -input=false tfplan
          echo "apply_url=https://console.aws.amazon.com/" >> $GITHUB_OUTPUT

      # Commit and push state changes after apply
      - name: Commit and push state changes
        run: |
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Applied terraform changes - updated state $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main

      # Commit and push state changes after apply
      - name: Commit and push state changes
        run: |
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Applied terraform changes - updated state $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main

  terraform-apply-auto:
    name: Terraform Apply (Auto-Approve)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply-auto-approve') || (github.ref == 'refs/heads/main' && github.event_name == 'push')

    permissions:
      contents: write  # Required for state file management
      pull-requests: write
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for state file management
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pull latest changes including state files
      - name: Pull latest state from repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --ff-only || echo "No remote changes to pull"

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      # Download terraform plan from plan job
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      # Apply without manual approval
      - name: Terraform Apply (Auto-Approve)
        id: apply-auto
        working-directory: .
        run: |
          echo "Applying Terraform plan with auto-approve..."
          terraform apply -input=false tfplan
          echo "✅ Terraform apply completed successfully!"

      # Commit and push state changes after apply
      - name: Commit and push state changes
        run: |
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Applied terraform changes (auto-approve) - updated state $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production
      url: ${{ steps.destroy.outputs.destroy_url }}

    permissions:
      contents: write  # Required for state file management
      pull-requests: write
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for state file management
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pull latest changes including state files
      - name: Pull latest state from repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --ff-only || echo "No remote changes to pull"

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      # Destroy with manual approval (handled by environment protection)
      - name: Terraform Destroy
        id: destroy
        working-directory: .
        run: |
          echo "Destroying Terraform resources..." 
          terraform destroy -auto-approve
          echo "destroy_url=https://console.aws.amazon.com/" >> $GITHUB_OUTPUT

      # Commit and push state changes after destroy
      - name: Commit and push state changes after destroy
        run: |
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Destroyed terraform resources - updated state $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
