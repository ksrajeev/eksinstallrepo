name: Terraform on AWS (master push)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - apply-auto-approve
        - destroy

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    # If you later switch to OIDC + role assumption, add:
    # permissions:
    #   id-token: write
    #   contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # (Optional) Verify the identity to ensure credentials are set
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # set a pinned version if you want; otherwise latest stable
          terraform_version: 1.7.5

      # Set this to the directory where your Terraform code lives, if not repo root
      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: .
        run: terraform validate -no-color

      - name: Terraform Plan
        working-directory: .
        run: terraform plan -no-color -input=false -out=tfplan

      # Upload terraform plan for apply job
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment:
      name: production
      url: ${{ steps.apply.outputs.apply_url }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      # Download terraform plan from plan job
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      # Apply with manual approval (handled by environment protection)
      - name: Terraform Apply
        id: apply
        working-directory: .
        run: |
          echo "Applying Terraform plan..."
          terraform apply -input=false tfplan
          echo "apply_url=https://console.aws.amazon.com/" >> $GITHUB_OUTPUT

  terraform-apply-auto:
    name: Terraform Apply (Auto-Approve)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply-auto-approve') || (github.ref == 'refs/heads/main' && github.event_name == 'push')

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      # Download terraform plan from plan job
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      # Apply without manual approval
      - name: Terraform Apply (Auto-Approve)
        id: apply-auto
        working-directory: .
        run: |
          echo "Applying Terraform plan with auto-approve..."
          terraform apply -input=false tfplan
          echo "✅ Terraform apply completed successfully!"

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production
      url: ${{ steps.destroy.outputs.destroy_url }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Configure AWS creds from GitHub Secrets (IAM user keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: .
        run: terraform init -input=false

      # Destroy with manual approval (handled by environment protection)
      - name: Terraform Destroy
        id: destroy
        working-directory: .
        run: |
          echo "Destroying Terraform resources..."
          terraform destroy -auto-approve
          echo "destroy_url=https://console.aws.amazon.com/" >> $GITHUB_OUTPUT
